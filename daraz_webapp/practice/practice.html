<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />

    <link rel="stylesheet" href="practice.css">
    <title>
      Download App
    </title>
  </head>
  <body>
    <div class="download-app-container">
      <div class="header-portion">
        <img src="../images/download-app-div-img/daraz-logo.avif" class="header-portion-daraz-logo">
        <p class="header-portion-download-p">Download the App</p>
      </div>
      <div class="middle-portion">
        <div class="middle-portion-rating">
          <span class="material-symbols-outlined">
            star
          </span>
          4.8 Rated
        </div>
        <p class="middle-portion-download-p">Download App</p>
        <div class="middle-portion-logos">
          <div>
            <img src="../images/download-app-div-img/quick-delivery.avif" class="middle-portion-img-logo">
            <p class="middle-portion-p-logo">Free<br>Delivery</p>
          </div>
          <div>
            <img src="../images/download-app-div-img/limited-time-img.avif" class="middle-portion-img-logo">
            <p class="middle-portion-p-logo">Limited<br>Time</p>
          </div>
        </div>
      </div>
      <div class="last-portion">
        <div>
          <img src="../images/download-app-div-img/daraz-download-qr.avif" alt="Daraz QR code">
        </div>
        <div>
          <a href="#" class="app-store" aria-label="Download on the App Store"></a>
          <a href="#" class="play-store" aria-label="Get it on Google Play"></a>
        </div>
      </div>
      <p class="cfa-p">Download the App Now!</p>
    </div>
  </body>
</html>
