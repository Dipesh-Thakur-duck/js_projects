<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="index.css">
    <link rel="stylesheet" href="navbar.css">
    <link rel="stylesheet" href="img-slider.css">
    <link rel="stylesheet" href="hero-download.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
  </head>
  <body>
  <header>
      <nav class="navbar-daraz pb-4">
        <div class="container-lg">
          <ul class="nav-row1">
            <li>
              <a href="#">SAVE MORE ON APP</a>
            </li>
            <li>
              <a href="#">BECOME A SELLER</a>
            </li>
            <li>
              <a href="#">HELP & SUPPORT</a>
            </li>
            <li>
              <a href="#">LOGIN</a>
            </li>
            <li>
              <a href="#">SIGN UP</a>
            </li>
            <li>
              <a href="#">
                भाषा परिवर्तन
              </a>
            </li>
          </ul>
          <div class="d-flex justify-content-between nav-row2">
            <a class="navbar-logo" href="index.html">
              <img src="./images/daraz_nav_logo.png">
            </a>
            <div class="d-flex nav-search-bar-container">
              <div class="d-flex nav-search-bar-inner-container me-md-4 me-2 rounded-1 outflow-hidden">
                <input placeholder="Search in Daraz" class="nav-search py-1 py-md-2 px-md-4 px-2" type="text">
                <button class="d-flex justify-content-center align-items-center nav-search-icon px-2">
                  <span class="material-symbols-outlined">search</span>
                </button>
              </div>
              <span class="material-symbols-outlined nav-shopping-cart align-self-end">shopping_cart</span>
            </div>   
          </div>
        </div>
      </nav>
    </header>
    <main>
      <div class="hero container-lg ">
        <div class="img-slider position-relative">
          <div class="img-container">
            <img src="./images/slider-img/slider-img1.avif" class="img-slider-js active">
            <img src="./images/slider-img/slider-img2.avif" class="img-slider-js">
          </div>
          <div class="slider-side-btns position-absolute w-100 d-flex justify-content-between">
            <span class="material-symbols-outlined rounded-pill-end prevBtn">
              chevron_left
            </span>
            <span class="material-symbols-outlined rounded-pill-start nextBtn">
              chevron_right
            </span>
          </div>
          <div class="slider-dots position-absolute">
    
          </div>
          <div>
            
          </div>
        </div>
        <div class="download-app-container p-1">
          <div class="download-app-top-div mb-1">
            <img src="./images/download-app-div-img/daraz-logo.avif" class="download-app-top-div-img">
            <p class="download-app-top-div-p mb-0">Download the App</p>
          </div>
          <div class="download-app-middle-div p-2">
            <div class="d-flex align-items-center">
              <span class="material-symbols-outlined">
                star
              </span>
              4.8 Rated
            </div>
            <p class="download-app-middle-div-p pt-2">Download App</p>
            <div class="d-flex flex-column align-items-center pb-xxl-3">
              <div class="d-flex gap-2 align-items-start">
                <img src="../images/download-app-div-img/quick-delivery.avif" class="download-app-middle-div-logo">
                <p class="download-app-middle-div-logo-p">Free<br>Delivery</p>
              </div>
              <div class="d-flex gap-2 align-items-start">
                <img src="../images/download-app-div-img/limited-time-img.avif" class="download-app-middle-div-logo">
                <p class="download-app-middle-div-logo-p">Limited<br>Time</p>
              </div>
            </div>
          </div>
          <div class="download-app-bottom-div mb-1">
            <img src="./images/download-app-div-img/daraz-download-qr.avif" class="download-app-qr">
            <div class="d-flex flex-column justify-content-center gap-2">
              <a href="#" class="download-app-btn download-app-app-store"></a>
              <a href="#" class="download-app-btn download-app-play-store"></a>
            </div>
          </div>
        </div>
      </div>
    </main>
    <script src="img-slider.js"></script>
  </body>
</html>
